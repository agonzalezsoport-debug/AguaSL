<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Litros</title>
</head>
<body>

<h1>📊 Dashboard de Litros</h1>

<h2>Vendidos: {{ vendidos }} L</h2>
<h2>Cargados: {{ cargados }} L</h2>
<h2>Diferencia: {{ diferencia }} L</h2>

<hr>

<h3>Agregar litros</h3>
<form method="POST" action="/litros/agregar">
    <input type="number" step="0.01" name="litros" required>
    <button type="submit">Guardar</button>
</form>

<hr>

<h3>Historial</h3>
<table border="1">
<tr>
    <th>Litros</th>
    <th>Fecha</th>
</tr>

{% for l in historial %}
<tr>
    <td>{{ l[0] }}</td>
    <td>{{ l[1] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
