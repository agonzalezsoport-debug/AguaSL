{% extends "base.html" %}

{% block content %}

<h2 style="margin-bottom:20px;">👤 Crear Cajero</h2>

<!-- 🔙 BOTON VOLVER -->
<button onclick="history.back()" class="btn-volver">⬅ Volver</button>

<div class="card">

    <form method="POST" class="form-pro">

        <input name="nombre" placeholder="Nombre del cajero" required>

        <input name="password" type="password" placeholder="Contraseña" required>

        <button type="submit">➕ Crear Cajero</button>

    </form>

</div>

<style>

/* 🔙 BOTON VOLVER */
.btn-volver{
    margin-bottom:15px;
    background:#374151;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
}

.btn-volver:hover{
    background:#111827;
}

/* 📦 CARD */
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    max-width:400px;
}

/* 🧾 FORM */
.form-pro{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.form-pro input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* 🔵 BOTON */
.form-pro button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.form-pro button:hover{
    background:#1d4ed8;
}

</style>

{% endblock %}
