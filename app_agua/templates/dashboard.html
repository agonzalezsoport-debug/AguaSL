{% extends "base.html" %}

{% block content %}

<h2>Panel de Control</h2>

<div class="grid">

    <div class="card stat blue">
        <h3>{{clientes}}</h3>
        <p>Clientes</p>
    </div>

    <div class="card stat">
        <h3>{{pedidos}}</h3>
        <p>Pedidos</p>
    </div>

    <div class="card stat orange">
        <h3>{{pendientes}}</h3>
        <p>Pendientes</p>
    </div>

    <div class="card stat dark">
        <h3>${{total}}</h3>
        <p>Total</p>
    </div>

</div>

<div class="card">
    <h2>Acciones rápidas</h2>

    <div class="grid">
        <a href="/clientes" class="card">👥 Clientes</a>
        <a href="/promos" class="card">🎁 Promos</a>
        <a href="/pedidos" class="card">📦 Pedidos</a>
        <a href="/reporte_ventas_cajero" class="card">
            📊 Ventas por Cajero
        </a>
    </div>
</div>

{% endblock %}
