{% extends "base.html" %}

{% block content %}

<h2>📦 Agregar Producto</h2>

<form method="POST">

    <input type="text" name="codigo" placeholder="Código (ej: 20L)" required>
    <br><br>

    <input type="text" name="descripcion" placeholder="Descripción" required>
    <br><br>

    <input type="number" name="litros" placeholder="Litros" required>
    <br><br>

    <input type="number" step="0.01" name="precio" placeholder="Precio" required>
    <br><br>

    <input type="number" name="stock" placeholder="Stock inicial" required>
    <br><br>
     <!-- 🔥 NUEVO -->
    <label>📂 Departamento:</label>
    <select name="departamento" required>
        <option value="">Seleccionar</option>
        <option value="Agua">Agua</option>
        <option value="Bebidas">Bebidas</option>
        <option value="Limpieza">Limpieza</option>
        <option value="Otros">Otros</option>
    </select>
    <br><br>

    <button type="submit">➕ Agregar producto</button>

</form>

<hr>

<a href="/ventas">⬅ Volver a ventas</a>

{% endblock %}
