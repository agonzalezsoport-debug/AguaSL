{% extends "base.html" %}
{% block content %}

<div class="container" style="max-width: 600px; margin: auto; padding: 20px;">
    <h2>📦 Agregar Nuevo Producto</h2>

    <div class="card" style="padding: 25px; border-radius: 15px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <form method="POST">
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Código del Producto:</label>
                <input type="text" name="codigo" placeholder="Ej: 20L" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Descripción:</label>
                <input type="text" name="descripcion" placeholder="Nombre del producto" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em;">
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Litros:</label>
                    <input type="number" name="litros" placeholder="0" required 
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Stock Inicial:</label>
                    <input type="number" name="stock" placeholder="0" required 
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em;">
                </div>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Precio ($):</label>
                    <input type="number" step="0.01" name="precio" placeholder="0.00" required 
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">📂 Departamento:</label>
                    <select name="departamento" required 
                            style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; background: white;">
                        <option value="">Seleccionar</option>
                        <option value="Agua">Agua</option>
                        <option value="Bebidas">Bebidas</option>
                        <option value="Limpieza">Limpieza</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn success" 
                    style="width: 100%; padding: 15px; font-size: 1.1em; border-radius: 8px; cursor: pointer; margin-top: 10px; border: none; background: #28a745; color: white; font-weight: bold;">
                ➕ Agregar producto
            </button>
        </form>
    </div>

    <div style="margin-top: 20px; text-align: center;">
        <a href="/dashboard_cajero" style="text-decoration: none; color: #666; font-weight: bold;">⬅ Volver al Panel</a>
    </div>
</div>

{% endblock %}
