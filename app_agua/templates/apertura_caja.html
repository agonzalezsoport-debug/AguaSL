
<!DOCTYPE html>
<html>
<head>
    <title>Apertura de Caja</title>
</head>
<body style="background:#f2f2f2;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:white;padding:30px;border-radius:10px;width:300px;text-align:center;">

    <h2>💰 Apertura de Caja</h2>

    <form method="POST">

        <label>Dinero inicial en caja</label>

        <input type="number"
               name="monto_inicial"
               step="0.01"
               required
               style="width:100%;padding:10px;margin-top:10px;font-size:18px;">

        <button type="submit"
                style="margin-top:15px;width:100%;padding:10px;background:green;color:white;border:none;">
            Abrir Caja
        </button>

    </form>

</div>

</body>
</html>
