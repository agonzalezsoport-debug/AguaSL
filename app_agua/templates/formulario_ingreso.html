<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso de Hacienda - Panel Auditoría</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 20px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #495057; }
        input { padding: 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 16px; }
        input:focus { border-color: #28a745; outline: none; box-shadow: 0 0 0 0.2rem rgba(40,167,69,0.25); }
        .btn-success { background-color: #28a745; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-success:hover { background-color: #218838; }
        .back-link { display: inline-block; margin-top: 15px; color: #6c757d; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>🥩 Registrar Ingreso de Hacienda</h2>
    
    <form action="/compras/guardar" method="POST">
        <div class="form-group">
            <label for="fecha_ingreso">Fecha de Ingreso:</label>
            <input type="date" id="fecha_ingreso" name="fecha_ingreso" value="2026-07-01" required>
        </div>
        
        <div class="form-group">
            <label for="proveedor">Proveedor / Frigorífico:</label>
            <input type="text" id="proveedor" name="proveedor" placeholder="Ej: Frigorífico Los Pampeanos" required>
        </div>

        <div class="form-group">
            <label for="kg_gancho">Kilos Gancho (Compra Bruta):</label>
            <input type="number" step="0.01" id="kg_gancho" name="kg_gancho" placeholder="0.00" required>
        </div>

        <div class="form-group">
            <label for="costo_x_kg">Costo por Kilo Gancho ($):</label>
            <input type="number" step="0.01" id="costo_x_kg" name="costo_x_kg" placeholder="0.00" required>
        </div>

        <div class="form-group">
            <label for="kg_limpios">Kilos Limpios (Rendimiento Mostrador):</label>
            <input type="number" step="0.01" id="kg_limpios" name="kg_limpios" placeholder="0.00" required>
        </div>

        <button type="submit" class="btn-success">Registrar Hacienda e Iniciar Control</button>
    </form>
    
    <a href="/auditoria/balance-diario" class="back-link">← Volver al Balance Diario</a>
</div>

</body>
</html>
