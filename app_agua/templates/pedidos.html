{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>📦 Gestión de Pedidos</h2>

    {% for p in pedidos %}
    <div class="card">

        <!-- INFO DEL PEDIDO -->
        <strong>Pedido #{{p[0]}}</strong><br>
        Cliente: {{p[1]}}<br>
        Promo: {{p[2]}}<br>
        Fecha: {{p[3]}}<br><br>

        <!-- ESTADO ACTUAL -->
        <span class="estado {{p[4]|lower|replace(' ', '')}}">
            {{p[4]}}
        </span>

        <br><br>

        <!-- BOTONES PARA CAMBIAR ESTADO -->
        <div style="display:flex; gap:10px; flex-wrap:wrap;">

            <a href="/pedido/estado/{{p[0]}}/pendiente" class="btn">
                Pendiente
            </a>

            <a href="/pedido/estado/{{p[0]}}/enproceso" class="btn">
                En proceso
            </a>

            <a href="/pedido/estado/{{p[0]}}/entregado" class="btn">
                Entregado
            </a>

            <a href="/pedido/estado/{{p[0]}}/cancelado" class="btn">
                Cancelar
            </a>

        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
