{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 900px; margin: auto; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>🛒 Compras Online</h2>
        <a href="/carrito" class="btn" style="background: #333; color:white; padding: 10px 20px; border-radius: 50px; text-decoration: none;">
            Ver Carrito ({{ session.get('carrito_cliente', [])|length }}) 🛍️
        </a>
    </div>

    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
        {% for p in productos %}
        <div class="card" style="background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 10px;">💧</div>
            <h3 style="margin: 5px 0;">{{ p[1] }}</h3>
            <p style="color: #28a745; font-size: 1.4em; font-weight: bold; margin: 10px 0;">${{ p[2] }}</p>
            
            <form action="/carrito/agregar" method="POST">
                <input type="hidden" name="id" value="{{ p[0] }}">
                <button type="submit" class="btn success" style="width: 100%; border-radius: 10px; border: none; padding: 12px; cursor: pointer; font-weight: bold;">
                    ➕ Agregar al carrito
                </button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
