
{% extends "base.html" %}

{% block content %}

<h2>💧 Promos disponibles</h2>

{% for p in promos %}
<div class="card">

    <strong>{{p[1]}}</strong>
    <div class="muted">{{p[2]}}</div>
    <div class="precio">${{p[3]}}</div>

    <form method="POST" action="/pedidos_cliente/agregar">
        <input type="hidden" name="promo_id" value="{{p[0]}}">
        <label>Fecha de entrega:</label>
        <input type="date" name="fecha" required>
        <button type="submit">Pedir ahora</button>
    </form>

</div>
{% endfor %}

<h2>📦 Mis pedidos</h2>

{% for p in pedidos %}
<div class="card">

    <div>
        <strong>{{p[1]}}</strong>
        <div class="muted">{{p[2]}}</div>
    </div>

    <!-- ESTADO CORREGIDO -->
    <span class="estado {{p[3]|lower|replace(' ', '')}}">
        {{p[3]}}
    </span>

</div>
{% endfor %}

<!-- BOTÓN FLOTANTE -->
<div class="fab">+</div>

{% endblock %}
