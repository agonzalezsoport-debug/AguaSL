<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Cajero</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="home">

<div class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>💼 Acceso Cajeros</h1>
        <p>Ingresá con tu usuario y contraseña</p>

        <!-- 🔥 MENSAJE DE ERROR -->
        {% if error %}
            <div style="color:#ef4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; border: 1px solid rgba(239, 68, 68, 0.2);">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/login_cajero" class="login-form" id="formLoginCajero">

            <input type="text" name="nombre" id="inputUsuario" placeholder="Usuario" required>

            <input type="password" name="password" placeholder="Contraseña" required>

            <!-- Campo invisible para la bandera de confirmación -->
            <input type="hidden" name="confirmado_reingreso" id="confirmadoReingreso" value="false">

            <button type="submit" class="btn">
                🔐 Ingresar
            </button>

        </form>

        <br>

        <a href="/" class="btn outline">
            ⬅ Volver al inicio
        </a>

    </div>

</div>

<script>
document.getElementById("formLoginCajero").addEventListener("submit", function(e) {
    // Si el usuario ya aceptó el reingreso, enviamos el formulario nativo sin trabas
    if (document.getElementById("confirmadoReingreso").value === "true") {
        return;
    }

    e.preventDefault(); // Frenamos el envío para inspeccionar el endpoint del servidor
    const form = this;
    
    // Limpiamos el texto digitado para evitar fallas de comparación
    const usuarioDigitado = document.getElementById("inputUsuario").value.trim().toLowerCase();

    fetch("/verificar_caja")
    .then(res => res.json())
    .then(data => {
        // Si el backend confirma que existe una caja abierta
        if (data.ABIERTA && data.cajero) {
            const cajeroAsignado = data.cajero.trim().toLowerCase();
            
            // Si el cajero de la caja abierta coincide con el que intenta loguearse
            if (usuarioDigitado === cajeroAsignado) {
                let respuesta = confirm(`⚠️ TURNOS SIMULTÁNEOS DETECTADOS:\n\nYa figura una caja ABIERTA en el sistema bajo el usuario '${data.cajero}'.\n\n¿Deseás ingresar de todas formas y continuar vendiendo en esa misma caja?\n\n[Aceptar] = Entrar directo a realizar ventas.\n[Cancelar] = Volver atrás para cambiar de usuario.`);
                
                if (respuesta) {
                    // Activamos la bandera y enviamos el formulario físico
                    document.getElementById("confirmadoReingreso").value = "true";
                    form.submit();
                } else {
                    // Si presiona Cancelar, limpiamos los campos y se queda en el login
                    form.reset();
                }
            } else {
                // Si la caja pertenece a otra persona, dejamos pasar el flujo para que
                // la ruta /login_cajero aplique los rechazos correspondientes en el servidor
                document.getElementById("confirmadoReingreso").value = "true";
                form.submit();
            }
        } else {
            // Si no hay ninguna caja abierta en el sistema, ingresa directo
            document.getElementById("confirmadoReingreso").value = "true";
            form.submit();
        }
    })
    .catch(err => {
        // En caso de caída de red o error de JSON, se envía por el método tradicional para no congelar la app
        document.getElementById("confirmadoReingreso").value = "true";
        form.submit();
    });
});
</script>

</body>
</html>
