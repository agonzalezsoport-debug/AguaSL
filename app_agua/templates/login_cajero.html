<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Cajero</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="home">

<div class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>💼 Acceso Cajeros</h1>
        <p>Ingresá con tu usuario y contraseña</p>

        <!-- 🔥 MENSAJE DE ERROR -->
        {% if error %}
            <div style="color:#ef4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; border: 1px solid rgba(239, 68, 68, 0.2);">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="login-form">

            <input type="text" name="nombre" placeholder="Usuario" required>

            <input type="password" name="password" placeholder="Contraseña" required>

            <!-- 📌 CAMPO INVISIBLE MANDATORIO PARA INTERCEPTAR CONFIRMACIONES -->
            <input type="hidden" name="confirmado_reingreso" value="false">

            <button type="submit" class="btn">
                🔐 Ingresar
            </button>

        </form>

        <br>

        <a href="/" class="btn outline">
            ⬅ Volver al inicio
        </a>

    </div>

</div>

</body>
</html>
