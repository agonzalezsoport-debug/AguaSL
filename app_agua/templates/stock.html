{% extends "base.html" %}

{% block content %}

<h2>📦 Stock de Productos</h2>

<table border="1" cellpadding="10" style="width:100%; border-collapse: collapse;">
    <tr style="background:#eee;">
        <th>Código</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Guardar</th>
    </tr>

    {% for p in productos %}
    <tr>
        <form method="POST">

            <td><b>{{ p[1] }}</b></td>

            <td>
                <input type="text" name="descripcion" value="{{ p[2] }}" style="width:100%">
            </td>

            <td>
                <input type="number" step="0.01" name="precio" value="{{ p[3] }}" style="width:100%">
            </td>

            <td>
                <input type="number" name="stock" value="{{ p[4] }}" style="width:100%">
            </td>

            <td>
                <input type="hidden" name="id" value="{{ p[0] }}">
                <button type="submit">💾 Guardar</button>
            </td>

        </form>
    </tr>
    {% endfor %}

</table>

<br>

<a href="/dashboard">⬅ Volver al panel</a>

{% endblock %}
